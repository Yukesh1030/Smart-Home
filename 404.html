<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | STACKLY</title>
  <!-- CSS Styles -->
  <link rel="stylesheet" href="style.css">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="error-page">

  <div class="error-container reveal-up">
    <div class="error-code">404</div>
    <h1 class="error-title">Page not Found</h1>
    <p class="error-message">Oops! The smart route you were trying to access does not exist or has been relocated within the STACKLY ecosystem.</p>
    
    <div class="error-btns">
      <button onclick="window.history.back();" class="btn btn-secondary" id="errBackBtn"><i data-lucide="arrow-left"></i> Back</button>
      <a href="index.html" class="btn btn-primary" id="errHomeBtn"><i data-lucide="home"></i> Back to Home</a>
    </div>
  </div>

  <!-- Scripts -->
  <script src="main.js"></script>
</body>
</html>
