<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | STACKLY Smart Home</title>
  <meta name="description" content="Create a new STACKLY smart home profile. Control, monitor, and secure your household devices easily.">
  <!-- CSS Styles -->
  <link rel="stylesheet" href="style.css">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="auth-page">

  <a href="login.html" class="auth-nav"><i data-lucide="arrow-left" style="width:16px;"></i> Back to Login</a>

  <div class="auth-card reveal-up">
    <div class="auth-logo">STACKLY<span>.</span></div>
    
    <div class="auth-header">
      <h1>Create Account</h1>
      <p>Sign up to start automating your home ecosystem</p>
    </div>

    <form class="auth-form" id="signupForm">
      <div class="form-group">
        <label class="form-label">Sign Up As</label>
        <select class="form-control" id="roleSelect" style="appearance: none; background-image: url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2224%22 height=%2224%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%236B7280%22 stroke-width=%222%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22 class=%22lucide lucide-chevron-down%22><path d=%22m6 9 6 6 6-6%22/></svg>'); background-repeat: no-repeat; background-position: right 1rem center; background-size: 16px;" required>
          <option value="customer">Home Owner</option>
          <option value="seller">Technician</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-control" placeholder="John Doe" required id="nameInput">
      </div>
      
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" placeholder="you@example.com" required id="emailInput">
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" placeholder="••••••••" required id="passInput">
      </div>

      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" class="form-control" placeholder="••••••••" required id="confirmPassInput">
      </div>

      <button type="submit" class="auth-btn">Sign Up <i data-lucide="user-plus" style="width:18px;"></i></button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Login</a>
    </div>
  </div>

  <!-- Scripts -->
  <script src="main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const signupForm = document.getElementById('signupForm');
      if (signupForm) {
        signupForm.addEventListener('submit', function(e) {
          e.preventDefault();
          
          const pass = document.getElementById('passInput').value;
          const confirmPass = document.getElementById('confirmPassInput').value;
          
          if (pass !== confirmPass) {
            alert("Passwords do not match!");
            return;
          }
          
          // Save mock user creation details
          const name = document.getElementById('nameInput').value;
          const email = document.getElementById('emailInput').value;
          const role = document.getElementById('roleSelect').value;
          
          localStorage.setItem('stackly_registered_name', name);
          localStorage.setItem('stackly_registered_email', email);
          localStorage.setItem('stackly_registered_role', role);

          alert("Account created successfully! Redirecting you to the login page.");
          window.location.replace('login.html');
        });
      }
    });
  </script>
</body>
</html>
