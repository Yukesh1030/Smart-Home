<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | STACKLY Smart Home</title>
  <meta name="description" content="Access your STACKLY smart home dashboard. Log in to control devices, view feeds, and configure automation modes.">
  <!-- CSS Styles -->
  <link rel="stylesheet" href="style.css">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="auth-page">

  <a href="index.html" class="auth-nav"><i data-lucide="arrow-left" style="width:16px;"></i> Back to Home</a>

  <div class="auth-card reveal-up">
    <div class="auth-logo">STACKLY<span>.</span></div>
    
    <div class="auth-header">
      <h1>Welcome Back</h1>
      <p>Access your STACKLY home management profile</p>
    </div>

    <form class="auth-form" id="loginForm">
      <div class="form-group">
        <label class="form-label">Login As</label>
        <select class="form-control" id="roleSelect" style="appearance: none; background-image: url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2224%22 height=%2224%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%236B7280%22 stroke-width=%222%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22 class=%22lucide lucide-chevron-down%22><path d=%22m6 9 6 6 6-6%22/></svg>'); background-repeat: no-repeat; background-position: right 1rem center; background-size: 16px;" required>
          <option value="customer">Home Owner</option>
          <option value="seller">Technician</option>
        </select>
      </div>
      
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" placeholder="you@example.com" required id="emailInput">
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" placeholder="••••••••" required id="passInput">
      </div>

      <button type="submit" class="auth-btn">Login <i data-lucide="arrow-right" style="width:18px;"></i></button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="signup.html">Create Account</a>
    </div>
  </div>

  <!-- Scripts -->
  <script src="main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const loginForm = document.getElementById('loginForm');
      if (loginForm) {
        loginForm.addEventListener('submit', function(e) {
          e.preventDefault();
          const role = document.getElementById('roleSelect').value;
          
          // Set mock session details
          localStorage.setItem('stackly_logged_in', 'true');
          localStorage.setItem('stackly_user_role', role);
          localStorage.setItem('stackly_user_email', document.getElementById('emailInput').value);

          // Redirect to appropriate dashboard
          if (role === 'seller') {
            window.location.replace('sellerdashboard.html');
          } else {
            window.location.replace('customerdashboard.html');
          }
        });
      }
    });
  </script>
</body>
</html>
